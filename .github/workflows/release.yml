name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release"
        required: true

permissions:
  contents: write

jobs:
  build-matrix:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.runs-on }}
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            runs-on: macos-latest
          - target: x86_64-apple-darwin
            runs-on: macos-15-intel
          - target: x86_64-unknown-linux-gnu
            runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Create tarball
        run: |
          mkdir -p arrrv-${{ matrix.target }}/bin
          cp target/${{ matrix.target }}/release/arrrv arrrv-${{ matrix.target }}/bin/
          tar czf arrrv-${{ matrix.target }}.tar.gz arrrv-${{ matrix.target }}/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: arrrv-${{ matrix.target }}
          path: arrrv-${{ matrix.target }}.tar.gz

  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [build-matrix]
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifact files
        run: |
          mkdir -p release-assets
          find artifacts -name "*.tar.gz" -exec cp {} release-assets/ \;

      - name: Generate installer script
        run: |
          cat > install.sh << 'EOF'
          #!/bin/bash
          set -e

          REPO="A-Fisk/arrrv"
          TAG="${1:-latest}"

          if [ "$TAG" = "latest" ]; then
            TAG=$(curl -s https://api.github.com/repos/$REPO/releases/latest | grep '"tag_name"' | sed -E 's/.*"([^"]+)".*/\1/')
          fi

          case "$(uname -s)" in
            Darwin)
              case "$(uname -m)" in
                arm64)
                  TARGET="aarch64-apple-darwin"
                  ;;
                x86_64)
                  TARGET="x86_64-apple-darwin"
                  ;;
                *)
                  echo "Unsupported macOS architecture: $(uname -m)"
                  exit 1
                  ;;
              esac
              ;;
            Linux)
              TARGET="x86_64-unknown-linux-gnu"
              ;;
            *)
              echo "Unsupported OS: $(uname -s)"
              exit 1
              ;;
          esac

          INSTALL_DIR="${INSTALL_DIR:-$HOME/.local/bin}"
          mkdir -p "$INSTALL_DIR"

          URL="https://github.com/$REPO/releases/download/$TAG/arrrv-$TARGET.tar.gz"
          echo "Downloading arrrv $TAG for $TARGET..."

          TEMP_DIR=$(mktemp -d)
          trap "rm -rf $TEMP_DIR" EXIT

          curl -LsSf "$URL" -o "$TEMP_DIR/arrrv.tar.gz"
          tar -xzf "$TEMP_DIR/arrrv.tar.gz" -C "$TEMP_DIR"

          cp "$TEMP_DIR/arrrv-$TARGET/bin/arrrv" "$INSTALL_DIR/arrrv"
          chmod +x "$INSTALL_DIR/arrrv"

          echo "✓ arrrv installed to $INSTALL_DIR/arrrv"
          echo ""
          echo "Make sure $INSTALL_DIR is in your \$PATH:"
          echo "  export PATH=\"$INSTALL_DIR:\$PATH\""
          echo ""
          echo "Then run: arrrv --help"
          EOF
          chmod +x install.sh

      - name: Upload binaries and installer to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release-assets/*.tar.gz
            install.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
